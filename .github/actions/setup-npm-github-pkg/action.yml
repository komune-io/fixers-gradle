name: 'Configure NPM with GitHub Packages'
description: 'Configures Npm to use a GitHub Packages repository for dependencies.'
inputs:
  npm-auth-token:
    description: "Npm Auth Token"
    required: true
  npm-registry:
    description: "Npm registry"
    required: false
    default: "npm.pkg.github.com"
outputs:
  setup_npm_github_pkg:
    description: "The path to the generated .npmrc file"
    value: ${{ steps.set_output.outputs.setup-npm-github-pkg }}
runs:
  using: "composite"
  steps:
    - id: setup_npm
      env:
        NPM_REGISTRY: ${{ inputs.npm-registry }}
        FIXERS_PUBLISH_NPM_GITHUB_TOKEN: ${{ inputs.npm-auth-token }}
      run: |
        echo "
          @komune-io:registry=https://${NPM_REGISTRY}
          //${NPM_REGISTRY}/:_authToken=${FIXERS_PUBLISH_NPM_GITHUB_TOKEN}
        " > .npmrc
      shell: bash
    - id: set_output
      run: echo "setup-npm-github-pkg=.npmrc" >> $GITHUB_OUTPUT
      shell: bash
