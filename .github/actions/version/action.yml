name: "Manage Version Tags"
description: "Manage version tags for different branches and snapshots."

inputs:
  use-snapshot:
    description: "Enable/disable using snapshot tags."
    required: false
    default: "true"
  branch-prefixes:
    description: "Snapshot tag to use for non-release branches."
    required: false
    default: "main release/ feat/ fix/ refact/ versioning/"
  with-snapshot-tag:
    description: "Snapshot tag to use for non-release branches."
    required: false
    default: ".${GITHUB_SHA:0:7}"
  with-main-pre-release-tag:
    description: "Pre-release tag for main branch."
    required: false
    default: "-SNAPSHOT"
  with-release-pre-release-tag:
    description: "Pre-release tag for release branches."
    required: false
    default: "-SNAPSHOT"
  with-feat-pre-release-tag:
    description: "Pre-release tag for feature branches."
    required: false
    default: "-dev-SNAPSHOT"
  with-fix-pre-release-tag:
    description: "Pre-release tag for fix branches."
    required: false
    default: "-dev-SNAPSHOT"
  with-refact-pre-release-tag:
    description: "Pre-release tag for refactoring branches."
    required: false
    default: "-dev-SNAPSHOT"
  with-versioning-pre-release-tag:
    description: "Pre-release tag for versioning branches."
    required: false
    default: "-dev-SNAPSHOT"
  with-default-tag:
    description: "Default tag to use if the specific branch tag is empty."
    required: false
    default: "-dev-SNAPSHOT"

outputs:
  VERSION:
    description: "Generated version with appropriate tag."
    value: ${{ steps.version.outputs.VERSION }}

runs:
  using: "composite"
  steps:
    - name: "Set Version Tag for Branch"
      env:
        GITHUB_HEAD_REF: ${{ github.head_ref }}
        GITHUB_REF: ${{ github.ref }}
        BRANCH_PREFIXES: ${{ inputs.branch-prefixes }}
        TAG_MAIN: ${{ inputs.with-main-pre-release-tag }}
        TAG_RELEASE: ${{ inputs.with-release-pre-release-tag }}
        TAG_FEAT: ${{ inputs.with-feat-pre-release-tag }}
        TAG_FIX: ${{ inputs.with-fix-pre-release-tag }}
        TAG_REFACT: ${{ inputs.with-refact-pre-release-tag }}
        TAG_VERSIONING: ${{ inputs.with-versioning-pre-release-tag }}
        TAG_DEFAULT: ${{ inputs.with-default-tag }}
      run: |
        VERSION=$(cat VERSION)
        echo "Original VERSION: $VERSION"

        # Initialize BRANCH_NAME_REF based on the event type
        if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
          BRANCH_NAME_REF="refs/heads/$GITHUB_HEAD_REF"
        else
          BRANCH_NAME_REF="$GITHUB_REF"
        fi
        echo "Branch Name: $BRANCH_NAME_REF"

        # Split branch-prefixes input into an array
        IFS=' ' read -r -a BRANCH_PREFIXES_ARR <<< "$BRANCH_PREFIXES"
        echo "Parsed BRANCH_PREFIXES: ${BRANCH_PREFIXES_ARR[@]}"

        TAGS=("$TAG_MAIN" "$TAG_RELEASE" "$TAG_FEAT" "$TAG_FIX" "$TAG_REFACT" "$TAG_VERSIONING")
        echo "TAGS array: ${TAGS[@]}"

        for ((i=0; i<${#BRANCH_PREFIXES_ARR[@]}; i++)); do
          echo "Checking branch prefix: $BRANCH_NAME_REF == refs/heads/${BRANCH_PREFIXES_ARR[i]}"
          if [[ "$BRANCH_NAME_REF" == "refs/heads/${BRANCH_PREFIXES_ARR[i]}"* ]]; then
            echo "Match found: ${BRANCH_PREFIXES_ARR[i]}"
            # Use the specific tag if available; otherwise, use the default tag from inputs
            TAG_TO_USE="${TAGS[i]:-$TAG_DEFAULT}"
            echo "Tag to use: $TAG_TO_USE"
            VERSION=${VERSION/-SNAPSHOT/$TAG_TO_USE}
            echo "Updated VERSION: $VERSION"
            echo "$VERSION" > VERSION
            break
          fi
        done

        if [ -f VERSION ]; then
          echo "Final VERSION: $(cat VERSION)"
        else
          echo "VERSION file not found after processing."
          exit 1
        fi
      shell: bash

    - name: "Set Snapshot Tag"
      if: inputs.use-snapshot == 'false'
      env:
        SNAPSHOT_TAG: ${{ inputs.with-snapshot-tag }}
      run: |
        if [ ! -f VERSION ]; then
          echo "::error::VERSION file not found"
          exit 1
        fi
        # Expand any shell parameter expansion in SNAPSHOT_TAG (e.g. ${GITHUB_SHA:0:7})
        # so that downstream consumers receive a plain string with no unexpanded references.
        SNAPSHOT_TAG_EXPANDED=$(eval "printf '%s' \"$SNAPSHOT_TAG\"")
        VERSION=$(cat VERSION)
        VERSION=${VERSION/-SNAPSHOT/$SNAPSHOT_TAG_EXPANDED}
        echo "$VERSION" > VERSION
      shell: bash
    - name: "Retrieve Version"
      id: version
      run: |
        if [ -f VERSION ]; then
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION"
        else
          echo "Error: VERSION file not found." >&2
          exit 1
        fi
      shell: bash

    - name: "Output Version Information"
      shell: bash
      env:
        VERSION_OUTPUT: ${{ steps.version.outputs.VERSION }}
      run: |
        echo "## Project Version Information" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -z "$VERSION_OUTPUT" ]; then
          echo "The VERSION file could not be found, or it's empty. Unable to retrieve the version information." >> $GITHUB_STEP_SUMMARY
        else
          echo "The project is being built with the following version:" >> $GITHUB_STEP_SUMMARY
          echo "* **Version:** $VERSION_OUTPUT" >> $GITHUB_STEP_SUMMARY
        fi
