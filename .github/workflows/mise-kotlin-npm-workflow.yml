name: Reusable Kotlin NPM Development Workflow (Mise)

on:
  workflow_call:
    inputs:
      java-version:
        description: "The Java version to use."
        required: false
        type: "string"
        default: "17"

      with-gradle-build-scan-publish:
        description: "Flag to enable gradle build scan publish"
        required: false
        default: true
        type: "boolean"

      mise-lint-task:
        description: "The mise task to execute for linting."
        required: false
        type: "string"
        default: "lint"

      mise-build-task:
        description: "The mise task to execute for building."
        required: false
        type: "string"
        default: "build"

      mise-test-task:
        description: "The mise task to execute for testing."
        required: false
        type: "string"
        default: "test"

      mise-stage-task:
        description: "The mise task to execute for staging."
        required: false
        type: "string"
        default: "stage"

      mise-check-task:
        description: "The mise task to execute for checking."
        required: false
        type: "string"
        default: "check"

      mise-promote-task:
        description: "The mise task to execute for promote."
        required: false
        type: "string"
        default: "promote"

      artifact-name:
        description: "The name for the uploaded artifact, if needed."
        required: false
        type: "string"

      artifact-path:
        description: "The path to the artifact to upload, if needed."
        required: false
        type: "string"

      version-with-snapshot-tag:
        description: "Snapshot tag suffix for versioning."
        required: false
        type: "string"
        default: ".${GITHUB_SHA:0:7}"

      on-tag:
        description: "Comma-separated list of task names that should be executed when a tag is pushed."
        required: false
        type: "string"
        default: 'false'

    secrets:
      PKG_GITHUB_USERNAME:
        required: false
      PKG_GITHUB_TOKEN:
        required: false
      NPM_PKG_STAGE_TOKEN:
        required: false
      NPM_PKG_PROMOTE_TOKEN:
        required: false

jobs:
  run-dev-tasks:
    runs-on: ubuntu-latest
    env:
      PKG_GITHUB_USERNAME: ${{ secrets.PKG_GITHUB_USERNAME }}
      PKG_GITHUB_TOKEN: ${{ secrets.PKG_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Mise
        uses: jdx/mise-action@v4

      - name: Initialize Java and Gradle Environment
        uses: komune-io/fixers-gradle/.github/actions/jvm@0.32.0
        with:
          with-gradle-build-scan-publish: ${{ inputs.with-gradle-build-scan-publish }}
          java-version: ${{ inputs.java-version }}

      - name: Get Version from File
        uses: komune-io/fixers-gradle/.github/actions/version@0.32.0
        with:
          use-snapshot: false
          with-main-pre-release-tag: '-alpha-SNAPSHOT'
          with-release-pre-release-tag: '-alpha-SNAPSHOT'
          with-snapshot-tag: ${{ inputs.version-with-snapshot-tag }}

      - name: Execute Mise Lint Task
        if: (contains(inputs.on-tag, inputs.mise-lint-task) && startsWith(github.ref, 'refs/tags/')) || (!startsWith(github.ref, 'refs/tags/'))
        uses: komune-io/fixers-gradle/.github/actions/mise-step-prepost@0.32.0
        with:
          mise-task: ${{ inputs.mise-lint-task }}

      - name: Execute Mise Build Task
        uses: komune-io/fixers-gradle/.github/actions/mise-step-prepost@0.32.0
        with:
          mise-task: ${{ inputs.mise-build-task }}

      - name: Execute Mise Test Task
        if: (contains(inputs.on-tag, inputs.mise-test-task) && startsWith(github.ref, 'refs/tags/')) || (!startsWith(github.ref, 'refs/tags/'))
        uses: komune-io/fixers-gradle/.github/actions/mise-step-prepost@0.32.0
        with:
          mise-task: ${{ inputs.mise-test-task }}

      - name: Execute Mise Stage Task
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') ||  (contains(inputs.on-tag, 'stage') && startsWith(github.ref, 'refs/tags/')) ) || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'stage'))
        uses: komune-io/fixers-gradle/.github/actions/mise-step-prepost@0.32.0
        with:
          mise-task: ${{ inputs.mise-stage-task }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_PKG_STAGE_TOKEN }}

      - name: Execute Mise Check Task
        if: (contains(inputs.on-tag, inputs.mise-check-task) && startsWith(github.ref, 'refs/tags/')) || (!startsWith(github.ref, 'refs/tags/'))
        uses: komune-io/fixers-gradle/.github/actions/mise-step-prepost@0.32.0
        with:
          mise-task: ${{ inputs.mise-check-task }}

      - name: Execute Mise Promote Task
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') ||  (contains(inputs.on-tag, 'promote') && startsWith(github.ref, 'refs/tags/'))
        uses: komune-io/fixers-gradle/.github/actions/mise-step-prepost@0.32.0
        with:
          mise-task: ${{ inputs.mise-promote-task }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_PKG_PROMOTE_TOKEN }}

      - name: Upload Artifact if Specified
        if: inputs.artifact-name != '' && inputs.artifact-path != ''
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}