name: Workflow Reusable - Make JVM

on:
  workflow_call:
    inputs:
      java-version:
        description: "The Java version to use."
        required: false
        type: "string"
        default: "17"

      with-gradle-build-scan-publish:
        description: "Flag to enable gradle build scan publish"
        required: false
        default: true
        type: "boolean"

      with-stage-docker-registry-login:
        description: 'Flag to enable Docker login to the stage Docker registry.'
        required: false
        default: 'false'
        type: "string"
        
      with-promote-docker-registry-login:
        description: 'Flag to enable Docker login to the promote Docker registry.'
        required: false
        default: 'false'
        type: "string"
        
      excluded-versioning-branch:
        description: "A single branch name prefix where the job should be excluded from running. For example, use 'versioning/' to skip running the job on any branch that starts with 'versioning/'."
        required: false
        type: "string"
        default: "versioning/"

      make-file:
        description: "The Makefile to execute."
        required: false
        type: "string"
        default: "Makefile"

      make-lint-task:
        description: "The Make command to execute for linting."
        required: false
        type: "string"
        default: "lint"

      make-build-task:
        description: "The Make command to execute for building."
        required: false
        type: "string"
        default: "build"

      make-test-task:
        description: "The Make command to execute for testing."
        required: false
        type: "string"
        default: "test"

      make-stage-task:
        description: "The Make command to execute for staging."
        required: false
        type: "string"
        default: "stage"

      make-check-task:
        description: "The Make command to execute for checking."
        required: false
        type: "string"
        default: "check"

      make-promote-task:
        description: "The Make command to execute for promote."
        required: false
        type: "string"
        default: "promote"

      docker-buildx-platform:
        description: "Specify the target platforms for Docker buildx, such as 'linux/amd64,linux/arm64'. Leave empty to use the default platform."
        required: false
        type: "string"

      docker-stage-repository:
        description: "The Docker registry to which images should be staged. Defaults to GitHub Container Registry (ghcr.io)."
        required: false
        type: "string"
        default: "ghcr.io"

      force-stage:
        description: "Flag to force execute stage task."
        required: false
        type: "string"
        default: "false"

      docker-promote-repository:
        description: "The Docker registry to which images should be promoted. Defaults to Docker Hub (docker.io)."
        required: false
        type: "string"
        default: "docker.io"

      artifact-name:
        description: "The name for the uploaded artifact, if needed."
        required: false
        type: "string"

      artifact-path:
        description: "The path to the artifact to upload, if needed."
        required: false
        type: "string"

      on-tag:
        description: "Comma-separated list of task names that should be executed when a tag is pushed. Set to 'false' to disable all tag-specific tasks."
        required: false
        type: "string"
        default: 'false'

    secrets:
      FIXERS_PUBLISH_SIGNING_GPG_KEY:
        required: false
      FIXERS_PUBLISH_SIGNING_GPG_KEY_PASSWORD:
        required: false
      FIXERS_PUBLISH_GITHUB_USERNAME:
        required: false
      FIXERS_PUBLISH_GITHUB_TOKEN:
        required: false
      FIXERS_PUBLISH_MAVEN_CENTRAL_USERNAME:
        required: false
      FIXERS_PUBLISH_MAVEN_CENTRAL_PASSWORD:
        required: false
      FIXERS_PUBLISH_GRADLE_PORTAL_KEY:
        required: false
      FIXERS_PUBLISH_GRADLE_PORTAL_SECRET:
        required: false
      FIXERS_SONAR_TOKEN:
        required: false
      # Docker registry login inputs — these are the workflow's own input names
      # for the docker/login-action step. Callers map their org secrets
      # (e.g. FIXERS_DOCKER_HUB_USERNAME) to these input names.
      DOCKER_STAGE_USERNAME:
        required: false
      DOCKER_STAGE_PASSWORD:
        required: false
      DOCKER_PROMOTE_USERNAME:
        required: false
      DOCKER_PROMOTE_PASSWORD:
        required: false

jobs:
  run-dev-tasks:
    if: (github.event_name == 'pull_request' && !startsWith(github.head_ref, inputs.excluded-versioning-branch)) || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      # FIXERS_PUBLISH_* names read by Kotlin plugin and gradle tasks via
      # PublishConfig's project.property() helper.
      FIXERS_PUBLISH_GITHUB_USERNAME: ${{ secrets.FIXERS_PUBLISH_GITHUB_USERNAME }}
      FIXERS_PUBLISH_GITHUB_TOKEN: ${{ secrets.FIXERS_PUBLISH_GITHUB_TOKEN }}
      FIXERS_PUBLISH_SIGNING_GPG_KEY: ${{ secrets.FIXERS_PUBLISH_SIGNING_GPG_KEY }}
      FIXERS_PUBLISH_SIGNING_GPG_KEY_PASSWORD: ${{ secrets.FIXERS_PUBLISH_SIGNING_GPG_KEY_PASSWORD }}
      FIXERS_PUBLISH_MAVEN_CENTRAL_USERNAME: ${{ secrets.FIXERS_PUBLISH_MAVEN_CENTRAL_USERNAME }}
      FIXERS_PUBLISH_MAVEN_CENTRAL_PASSWORD: ${{ secrets.FIXERS_PUBLISH_MAVEN_CENTRAL_PASSWORD }}
      # SonarQubeConfigurator reads FIXERS_SONAR_TOKEN and sets sonar.token
      # via the sonarqube extension DSL.
      FIXERS_SONAR_TOKEN: ${{ secrets.FIXERS_SONAR_TOKEN }}
      # Gradle Plugin Portal credentials: PublishPlugin.kt bridges these env vars
      # to the `gradle.publish.key`/`gradle.publish.secret` Gradle project properties
      # (via extraProperties) that `com.gradle.plugin-publish` reads at task-execution time.
      FIXERS_PUBLISH_GRADLE_PORTAL_KEY: ${{ secrets.FIXERS_PUBLISH_GRADLE_PORTAL_KEY }}
      FIXERS_PUBLISH_GRADLE_PORTAL_SECRET: ${{ secrets.FIXERS_PUBLISH_GRADLE_PORTAL_SECRET }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Add Firefox to Run Kotlin test
        uses: browser-actions/setup-firefox@v1

      - name: Initialize Java and Gradle Environment
        uses: komune-io/fixers-gradle/.github/actions/jvm@0.38.0
        with:
          with-gradle-build-scan-publish: ${{ inputs.with-gradle-build-scan-publish }}
          java-version: ${{ inputs.java-version }}

      - name: Get Version from File
        uses: komune-io/fixers-gradle/.github/actions/version@0.38.0

      - name: Execute Make Lint Task
        if: (contains(inputs.on-tag, inputs.make-lint-task) && startsWith(github.ref, 'refs/tags/')) || (!startsWith(github.ref, 'refs/tags/'))
        uses: komune-io/fixers-gradle/.github/actions/make-step-prepost@0.38.0
        with:
          make-file: ${{ inputs.make-file }}
          make-step: ${{ inputs.make-lint-task }}

      - name: Setup Docker Buildx for Specified Platforms
        if: inputs.docker-buildx-platform != ''
        uses: docker/setup-buildx-action@v4
        with:
          platforms: ${{ inputs.docker-buildx-platform }}

      - name: Execute Make Build Task
        uses: komune-io/fixers-gradle/.github/actions/make-step-prepost@0.38.0
        with:
          make-file: ${{ inputs.make-file }}
          make-step: ${{ inputs.make-build-task }}

      - name: Execute Make Test Task
        if: (contains(inputs.on-tag, inputs.make-test-task) && startsWith(github.ref, 'refs/tags/')) || (!startsWith(github.ref, 'refs/tags/'))
        uses: komune-io/fixers-gradle/.github/actions/make-step-prepost@0.38.0
        with:
          make-file: ${{ inputs.make-file }}
          make-step: ${{ inputs.make-test-task }}

      - name: Upload Analysis Reports
        uses: komune-io/fixers-gradle/.github/actions/upload-analysis-reports@0.38.0
        with:
          make-file: ${{ inputs.make-file }}

      - name: Docker Registry Login to Stage
        if: (inputs.force-stage == 'true' || (inputs.with-stage-docker-registry-login == 'true' && ((github.ref == 'refs/heads/main' ||startsWith(github.ref, 'refs/heads/release/') ||startsWith(github.ref, 'refs/heads/versioning/') ||(contains(inputs.on-tag, 'stage') && startsWith(github.ref, 'refs/tags/'))) ||(github.event_name == 'pull_request' &&(contains(github.event.pull_request.labels.*.name, 'stage') || startsWith(github.head_ref, 'versioning/'))))))
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.docker-stage-repository }}
          username: ${{ secrets.DOCKER_STAGE_USERNAME }}
          password: ${{ secrets.DOCKER_STAGE_PASSWORD }}

      - name: Execute Make Stage Task
        if: (inputs.force-stage == 'true' || (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || (contains(inputs.on-tag, 'stage') && startsWith(github.ref, 'refs/tags/'))) || (github.event_name == 'pull_request' && (contains(github.event.pull_request.labels.*.name, 'stage') || startsWith(github.head_ref, 'versioning/'))))
        uses: komune-io/fixers-gradle/.github/actions/make-step-prepost@0.38.0
        with:
          make-file: ${{ inputs.make-file }}
          make-step: ${{ inputs.make-stage-task }}
      - name: Execute Make Check Task
        if: (contains(inputs.on-tag, inputs.make-check-task) && startsWith(github.ref, 'refs/tags/')) || (!startsWith(github.ref, 'refs/tags/'))
        uses: komune-io/fixers-gradle/.github/actions/make-step-prepost@0.38.0
        with:
          make-file: ${{ inputs.make-file }}
          make-step: ${{ inputs.make-check-task }}

      - name: Docker Registry Login To Promote
        if: (inputs.with-promote-docker-registry-login == 'true' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') ||  (contains(inputs.on-tag, 'promote') && startsWith(github.ref, 'refs/tags/')) ))
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.docker-promote-repository }}
          username: ${{ secrets.DOCKER_PROMOTE_USERNAME }}
          password: ${{ secrets.DOCKER_PROMOTE_PASSWORD }}

      - name: Execute Make Promote Task
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') ||  (contains(inputs.on-tag, 'promote') && startsWith(github.ref, 'refs/tags/'))
        uses: komune-io/fixers-gradle/.github/actions/make-step-prepost@0.38.0
        with:
          make-file: ${{ inputs.make-file }}
          make-step: ${{ inputs.make-promote-task }}

      - name: Upload Artifact if Specified
        if: inputs.artifact-name != '' && inputs.artifact-path != ''
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
