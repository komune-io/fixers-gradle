name: Release New Version

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
      next_version:
        description: 'Next development version (e.g., 1.0.1-dev)'
        required: true
        type: string
    secrets:
      PKG_GITHUB_TOKEN:
        description: 'Token for package operations (defaults to github.token)'
        required: false

jobs:
  create-release-branch:
    runs-on: ubuntu-latest
    env:
      RELEASE_BRANCH: versioning/${{ inputs.version }}
      RELEASE_TAG: refs/tags/${{ inputs.version }}
      SOURCE_BRANCH: ${{ github.ref_name }}
    steps:
      - name: Print Env
        run: |
          echo "RELEASE_BRANCH: $RELEASE_BRANCH"
          echo "RELEASE_TAG: $RELEASE_TAG"
          echo "SOURCE_BRANCH: $SOURCE_BRANCH"
        shell: bash
      - name: Set up Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_BRANCH }}
          submodules: true
          token: ${{ secrets.PKG_GITHUB_TOKEN || github.token }}

      - name: Create new release branch
        run: git checkout -b "$RELEASE_BRANCH"
        shell: bash

      - name: Update VERSION file with new version
        env:
          VERSION_TAG: ${{ inputs.version }}
        run: echo "$VERSION_TAG" > VERSION
        shell: bash

      - name: Commit updated VERSION file
        env:
          VERSION_TAG: ${{ inputs.version }}
        run: |
          git add VERSION
          git commit -m "Bump version to ${VERSION_TAG}"
          git push origin "$RELEASE_BRANCH"
        shell: bash

      - name: Create a new Git tag
        env:
          VERSION_TAG: ${{ inputs.version }}
        run: |
          git tag -a "$VERSION_TAG" -m "Release version ${VERSION_TAG}"
          git push origin "refs/tags/${VERSION_TAG}"
        shell: bash

      - name: Update VERSION file to next development version
        env:
          NEXT_VERSION: ${{ inputs.next_version }}
        run: echo "$NEXT_VERSION" > VERSION
        shell: bash

      - name: Commit next development version
        env:
          NEXT_VERSION: ${{ inputs.next_version }}
        run: |
          git add VERSION
          git commit -m "Set next development version to ${NEXT_VERSION}"
          git push origin "$RELEASE_BRANCH"
        shell: bash

      - name: Create Pull Request via GitHub API
        env:
          PKG_GITHUB_TOKEN: ${{ secrets.PKG_GITHUB_TOKEN || github.token }}
          VERSION_TAG: ${{ inputs.version }}
          NEXT_VERSION: ${{ inputs.next_version }}
          REPO: ${{ github.repository }}
        run: |
          jq -n \
            --arg title "Release ${VERSION_TAG}" \
            --arg body "This PR releases version ${VERSION_TAG} and sets the version to ${NEXT_VERSION} for ongoing development. Please review and merge." \
            --arg head "$RELEASE_BRANCH" \
            --arg base "$SOURCE_BRANCH" \
            '{title: $title, body: $body, head: $head, base: $base}' | \
          curl -X POST \
            -H "Authorization: token ${PKG_GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pulls" \
            -d @-
        shell: bash
